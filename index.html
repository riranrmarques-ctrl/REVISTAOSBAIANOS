<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Duna News</title>

  <style>
    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      font-family: Arial, sans-serif;
      background: #000;
      color: #fff;
      overflow: hidden;
    }

    .container {
      position: relative;
      width: 100vw;
      height: 100vh;
    }

    .background {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      filter: brightness(0.85);
    }

    .overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(0,0,0,0.7), rgba(0,0,0,0.05));
      z-index: 1;
    }

    .logo-topo {
      position: absolute;
      top: 0;
      left: 0;
      z-index: 3;
      width: 420px;
      max-width: 35vw;
    }

    .qr-box {
      position: absolute;
      bottom: 30px;
      right: 30px;
      z-index: 3;
      text-align: center;
      width: 200px;
      text-decoration: none;
      color: #fff;
    }

    .qr-box img {
      width: 180px;
      height: 180px;
      object-fit: contain;
      background: #fff;
      padding: 10px;
      border-radius: 12px;
    }

    .qr-texto {
      margin-top: 8px;
      font-size: 16px;
      font-weight: bold;
      white-space: nowrap;
    }

    .conteudo {
      position: absolute;
      left: 34px;
      right: 260px;
      bottom: 34px;
      z-index: 3;
    }

    .fonte {
      font-size: 18px;
      color: #2ec5ff;
      margin-bottom: 12px;
    }

    .titulo {
      font-size: 54px;
      font-weight: bold;
      line-height: 1.08;
      max-width: 1200px;
      text-shadow: 0 4px 16px rgba(0,0,0,0.55);
    }
  </style>
</head>
<body>
  <div class="container">
    <img id="imagem" class="background" src="" alt="Imagem da notícia" />
    <div class="overlay"></div>

    <!-- 🔥 LOGO ATUALIZADA -->
    <img class="logo-topo" src="LOGO.png" alt="Duna News" />

    <a id="qrLink" class="qr-box" href="#" target="_blank">
      <!-- 🔥 QR ATUALIZADO -->
      <img id="qrCode" src="QRCODE.png" alt="QR Code" />
      <div class="qr-texto">Veja a notícia no site</div>
    </a>

    <div class="conteudo">
      <div class="fonte">Fonte: Os Baianos Revista</div>
      <div id="titulo" class="titulo">Carregando...</div>
    </div>
  </div>

  <script>
    const imagemEl = document.getElementById("imagem");
    const tituloEl = document.getElementById("titulo");
    const qrLinkEl = document.getElementById("qrLink");
    const qrCodeEl = document.getElementById("qrCode");

    let noticias = [];
    let indiceAtual = 0;

    function mostrarNoticia(index) {
      const noticia = noticias[index];

      tituloEl.innerText = noticia.titulo;
      imagemEl.src = noticia.imagem;

      qrLinkEl.href = noticia.link;

      qrCodeEl.src = `https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=${encodeURIComponent(noticia.link)}`;
    }

    fetch("/.netlify/functions/news2")
      .then(res => res.json())
      .then(data => {
        noticias = data;

        mostrarNoticia(0);

        setInterval(() => {
          indiceAtual = (indiceAtual + 1) % noticias.length;
          mostrarNoticia(indiceAtual);
        }, 7000); // 🔥 7 segundos
      });
  </script>
</body>
</html>
